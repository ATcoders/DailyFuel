<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Fuel</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
<h1>Daily Fuel</h1>

<div class="card">
<h2>Profile</h2>
<div class="grid">
<input id="age" type="number" placeholder="Age">
<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">
<select id="goal">
<option value="lose">Lose Weight</option>
<option value="maintain">Maintain</option>
<option value="gain">Gain Weight</option>
</select>
</div>
<button onclick="saveProfile()">Save</button>
</div>

<div class="stats">
<div class="card"><h3>Maintenance</h3><p id="maintenance">0</p></div>
<div class="card"><h3>Target</h3><p id="target">0</p></div>
<div class="card"><h3>Calories</h3><p id="calories">0</p></div>
<div class="card"><h3>Protein</h3><p id="protein">0g</p></div>
</div>

<div class="card">
<h2>Add Food</h2>
<input id="search" placeholder="Search food..." oninput="filterFoods()">
<select id="food"></select>
<input id="qty" type="number" value="1" min="1">
<button onclick="addFood()">Add Food</button>
<ul id="foodlog"></ul>
</div>

<div class="card">
<h2>Workout</h2>
<input id="workout" placeholder="Workout">
<input id="minutes" type="number" placeholder="Minutes">
<button onclick="addWorkout()">Add Workout</button>
<ul id="workoutlog"></ul>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
